services:
  - type: web
    name: tn-mbnr-production
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: AUTH_SECRET
        generateValue: true
      - key: QR_SECRET_KEY
        value: "MBNR_SECURE_TOKEN_2026_GRID"
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
